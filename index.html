<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="all">
        <div class="container">
            <div class="Heading">Rock Paper Scissor</div>
            <button id="rock">Rock</button>
            <button id="paper">Paper</button>
            <button id="scissor">Scissor</button>
        </div>
        <div class="message">
            <div class="result"></div>
            <div class="score"></div>
        </div>

    </div>
    <div class="Rules">
        <ol>
            <h1>Rules</h1>
            <li>You will play against computer</li>
            <li>Choose any one from rock, paper or scissor</li>
            <li>Your score will be shown to you once you start the game</li>
            <li>Those who score 5 point first will win</li>
            <li>Play and have fun</li>
            <li>Please DO NOT loose against a Clanker</li>
        </ol>
    </div>
</body>

</html>
